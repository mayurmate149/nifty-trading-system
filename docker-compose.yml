version: "3.8"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/nifty_trading
      - SESSION_SECRET=dev-secret-change-in-prod
      - NODE_ENV=development
    depends_on:
      - db
    env_file:
      - .env.local

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=nifty_trading
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
